<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spoon 読み上げ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--surface:#0f0f1e;--surface2:#16162a;--border:#2a2a4a;
  --accent:#7c3aed;--accent2:#a78bfa;--accent3:#34d399;
  --warn:#fbbf24;--danger:#f87171;--text:#e2e8f0;--text2:#64748b;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif}
body{display:flex;flex-direction:column;min-height:100dvh;padding:12px;gap:10px;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(124,58,237,.12),transparent 60%),
                   radial-gradient(ellipse at 80% 100%,rgba(52,211,153,.07),transparent 60%)}
header{display:flex;align-items:center;gap:8px;padding:4px 0}
header h1{font-family:'DotGothic16',monospace;font-size:1.1rem;
  background:linear-gradient(90deg,var(--accent2),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;transition:all .3s}
.dot.on{background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:blink 1.4s infinite}
.dot.err{background:var(--danger)}.dot.loading{background:var(--warn);animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.spk{display:none;align-items:center;gap:4px;font-size:.7rem;color:var(--accent3);margin-left:auto}
.spk.show{display:flex}
.bars{display:flex;gap:2px;align-items:flex-end;height:12px}
.bars span{width:2px;background:var(--accent3);border-radius:1px;animation:bar .5s ease-in-out infinite alternate}
.bars span:nth-child(1){height:3px}.bars span:nth-child(2){height:9px;animation-delay:.12s}
.bars span:nth-child(3){height:5px;animation-delay:.24s}.bars span:nth-child(4){height:11px;animation-delay:.08s}
@keyframes bar{to{height:12px}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.ct{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:8px}
input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:inherit;font-size:.9rem;padding:9px 12px;outline:none;-webkit-appearance:none}
input[type=text]:focus{border-color:var(--accent2)}
input[type=text]::placeholder{color:var(--text2)}
.btn{border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s;padding:10px 16px;font-size:.85rem}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--accent);color:#fff}.btn-d{background:#5a1d1d;color:var(--danger)}
.btn-g{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-f{width:100%;padding:12px}.btn-s{padding:6px 10px;font-size:.78rem}
.btn:disabled{opacity:.4;pointer-events:none}
.st{font-size:.75rem;color:var(--text2);text-align:center;margin-top:6px;min-height:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ci label{display:block;font-size:.68rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.ci select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:inherit;font-size:.82rem;padding:7px 8px;outline:none;-webkit-appearance:none}
.rr{display:flex;align-items:center;gap:6px}
.rr input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none}
.rr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent2)}
.rv{font-size:.75rem;color:var(--accent2);width:36px;text-align:right;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);font-size:.78rem;cursor:pointer;user-select:none;transition:all .15s}
.chip input{display:none}
.chip.on{background:rgba(124,58,237,.2);border-color:var(--accent2);color:var(--accent2)}
.ng-row{display:flex;gap:6px}
.ng-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.ng-tag{background:rgba(248,113,113,.12);border:1px solid var(--danger);border-radius:20px;
  color:var(--danger);font-size:.72rem;padding:3px 10px;cursor:pointer}
.ng-tag::after{content:' ×';font-weight:700}
.al{display:flex;flex-direction:column;gap:3px;max-height:130px;overflow-y:auto}
.ai{display:flex;align-items:center;gap:6px;font-size:.78rem;padding:2px 0}
.ai-label{flex:1;color:var(--warn)}.ai-word{color:var(--text2);font-size:.7rem}
.at{width:10px;height:10px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0}
.at.on{background:var(--accent3)}.at.off{background:var(--border)}
#log{display:flex;flex-direction:column;gap:4px;max-height:36dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#log::-webkit-scrollbar{width:2px}
#log::-webkit-scrollbar-thumb{background:var(--border)}
.li{display:flex;gap:6px;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.lt{font-size:.65rem;color:var(--text2);flex-shrink:0;padding-top:1px}
.lb{font-size:.82rem;line-height:1.45}
.lb.comment .nm{color:var(--accent2);font-weight:700}
.lb.sys{color:var(--text2);font-style:italic}
.lb.err{color:var(--danger)}.lb.join{color:var(--accent3)}.lb.aw{color:var(--warn)}
</style>
</head>
<body>

<header>
  <div class="dot" id="dot"></div>
  <h1>🎙 Spoon 読み上げ</h1>
  <div class="spk" id="spk">
    <div class="bars"><span></span><span></span><span></span><span></span></div>
    読み上げ中
  </div>
</header>

<!-- サーバー接続 -->
<div class="card">
  <div class="ct">サーバーURL（CloudflareのURLをそのまま貼る）</div>
  <input type="text" id="serverIP" placeholder="例: https://xxxx.trycloudflare.com" value="">
  <div style="height:8px"></div>
  <button class="btn btn-p btn-f" id="mainBtn" onclick="toggle()">▶ 読み上げ開始</button>
  <div class="st" id="st">PCでserver.pyとCloudflare Tunnelを起動してURLを入力してください</div>
</div>

<!-- 音声設定 -->
<div class="card">
  <div class="ct">音声設定</div>
  <div class="grid2">
    <div class="ci" style="grid-column:1/-1">
      <label>音声</label>
      <select id="vs"><option>読み込み中...</option></select>
    </div>
    <div class="ci">
      <label>速度 <span class="rv" id="rv">1.0×</span></label>
      <div class="rr"><input type="range" id="rr" min="0.5" max="2.5" step="0.1" value="1"
        oninput="rv.textContent=parseFloat(this.value).toFixed(1)+'×'"></div>
    </div>
    <div class="ci">
      <label>音量 <span class="rv" id="vv">100%</span></label>
      <div class="rr"><input type="range" id="vr" min="0" max="1" step="0.05" value="1"
        oninput="vv.textContent=Math.round(this.value*100)+'%'"></div>
    </div>
  </div>
  <div style="height:8px"></div>
  <div class="chips">
    <label class="chip on" id="c-cm"><input type="checkbox" checked onchange="uc(this,'c-cm')">💬 コメント</label>
    <label class="chip on" id="c-jn"><input type="checkbox" checked onchange="uc(this,'c-jn')">👋 入室</label>
    <label class="chip"    id="c-nm"><input type="checkbox" onchange="uc(this,'c-nm')">名前も読む</label>
    <label class="chip on" id="c-sk"><input type="checkbox" checked onchange="uc(this,'c-sk')">長文スキップ</label>
  </div>
</div>

<!-- NGワード -->
<div class="card">
  <div class="ct">NGワード</div>
  <div class="ng-row">
    <input type="text" id="ngi" placeholder="スキップしたいワード">
    <button class="btn btn-g btn-s" onclick="addNg()">追加</button>
  </div>
  <div class="ng-tags" id="ngt"></div>
</div>

<!-- アラートワード -->
<div class="card">
  <div class="ct">🔔 アラートワード</div>
  <div class="al" id="al"></div>
</div>

<!-- ログ -->
<div class="card" style="flex:1">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div class="ct" style="margin:0">コメントログ</div>
    <button class="btn btn-g btn-s" onclick="clearLog()">クリア</button>
  </div>
  <div id="log"></div>
</div>

<script>
const AW=[
  {w:"スプーン",l:"💰 投げ銭"},{w:"ギフト",l:"💰 ギフト"},{w:"推し",l:"💰 推し宣言"},
  {w:"初見",l:"👋 初見さん"},{w:"久しぶり",l:"👋 久しぶり"},{w:"おやすみ",l:"👋 離脱"},
  {w:"草",l:"😂 草"},{w:"笑",l:"😂 笑"},{w:"エモ",l:"😂 エモ"},
  {w:"質問",l:"🎙️ 質問"},{w:"リクエスト",l:"🎙️ リクエスト"},{w:"コラボ",l:"🎙️ コラボ希望"},
  {w:"メンバーズ",l:"🎙️ メンバーズ"},{w:"荒らし",l:"⚠️ 荒らし"},{w:"通報",l:"⚠️ 通報"},
];
let running=false,polling=null,lastTs=0;
let ng=[],voices=[],q=[],talking=false;
let ae=Object.fromEntries(AW.map(a=>[a.w,true]));

function getServer(){
  let url=document.getElementById("serverIP").value.trim();
  if(!url)return "";
  // IPアドレスのみ入力された場合はhttp://を付ける
  if(!url.startsWith("http")){
    url=`http://${url}:5000`;
  }
  // 末尾スラッシュを除去
  return url.replace(/\/+$/,"");
}

// 音声
function loadV(){
  voices=speechSynthesis.getVoices();
  const sel=document.getElementById("vs");
  const ja=voices.filter(v=>v.lang.startsWith("ja"));
  const list=ja.length?ja:voices;
  sel.innerHTML=list.map((v,i)=>`<option value="${i}">${v.name}</option>`).join("");
  list.forEach((v,i)=>{if(/Kyoko|O-Ren|Siri/i.test(v.name))sel.value=i});
}
speechSynthesis.onvoiceschanged=loadV;
setTimeout(loadV,300);

// アラート
function renderAW(){
  document.getElementById("al").innerHTML=AW.map(a=>`
    <div class="ai">
      <button class="at ${ae[a.w]?'on':'off'}" onclick="tgAW('${a.w}')"></button>
      <span class="ai-label">${a.l}</span>
      <span class="ai-word">「${a.w}」</span>
    </div>`).join("");
}
function tgAW(w){ae[w]=!ae[w];renderAW()}
renderAW();

// サーバーからコメント取得
async function fetchComments(){
  const server=getServer();
  if(!server)return;
  try{
    const r=await fetch(`${server}/comments/since/${lastTs}`,{mode:'cors'});
    if(!r.ok)return;
    const data=await r.json();
    const newComments=data.comments||[];
    for(const c of newComments){
      if(c.ts>lastTs)lastTs=c.ts;
      const {name,text}=c;
      if(isNG(text))continue;
      addLog(name,text,"comment");
      procC(name,text);
    }
  }catch(e){
    // サーバー接続失敗
  }
}

function procC(name,text){
  // アラートを先にキューへ
  for(const a of AW){
    if(ae[a.w]&&text.includes(a.w)){
      addLog("",`🔔 ${a.l}「${a.w}」`,"aw");
      enq(`アラート、${a.l}`);
    }
  }
  if(gc("c-cm")){
    if(gc("c-sk")&&text.length>40)return;
    text.split("\n").map(s=>s.trim()).filter(Boolean).forEach((p,i)=>{
      enq(i===0&&name&&gc("c-nm")?`${name}、${p}`:p);
    });
  }
}

async function toggle(){running?stop():await start()}
async function start(){
  const server=getServer();
  if(!server){setSt("❌ IPアドレスを入力してください");return}
  try{
    setSt("⏳ サーバーに接続中...");setDot("loading");
    document.getElementById("mainBtn").disabled=true;
    // 接続確認
    const r=await fetch(`${server}/status`,{signal:AbortSignal.timeout(10000),mode:'cors'});
    if(!r.ok){setSt(`❌ サーバーエラー: ${r.status}`);setDot("err");document.getElementById("mainBtn").disabled=false;return}
    const s=await r.json();
    if(!s.running){setSt("⚠️ PCでSeleniumが起動中ではありません。少し待ってください");setDot("err");document.getElementById("mainBtn").disabled=false;return}
    running=true;lastTs=Date.now()/1000-5; // 直近5秒のコメントから
    setDot("on");setSt("✅ 接続成功！読み上げ中...");
    addLog("","サーバー接続しました","sys");
    const b=document.getElementById("mainBtn");
    b.textContent="⏹ 停止";b.className="btn btn-d btn-f";b.disabled=false;
    polling=setInterval(fetchComments,1500);
  }catch(e){
    setDot("err");
    let msg=e.message;
    if(msg.includes("Failed to fetch")||msg.includes("NetworkError")){
      msg="URLが間違っているかサーバーが停止しています";
    }else if(msg.includes("timeout")||msg.includes("abort")){
      msg="タイムアウト。URLを確認してください";
    }
    setSt(`❌ 接続失敗: ${msg}`);
    document.getElementById("mainBtn").disabled=false;
  }
}
function stop(){
  running=false;clearInterval(polling);
  speechSynthesis.cancel();q=[];talking=false;
  document.getElementById("spk").classList.remove("show");
  setDot("");setSt("停止しました");
  const b=document.getElementById("mainBtn");
  b.textContent="▶ 読み上げ開始";b.className="btn btn-p btn-f";
}

function enq(text){q.push(text);procQ()}
function procQ(){
  if(talking||!q.length)return;
  talking=true;document.getElementById("spk").classList.add("show");
  const text=q.shift();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  u.rate=parseFloat(document.getElementById("rr").value);
  u.volume=parseFloat(document.getElementById("vr").value);
  const sel=document.getElementById("vs");
  const ja=voices.filter(v=>v.lang.startsWith("ja"));
  const list=ja.length?ja:voices;
  if(list[sel.value])u.voice=list[sel.value];
  u.onend=u.onerror=()=>{talking=false;document.getElementById("spk").classList.remove("show");procQ()};
  speechSynthesis.speak(u);
}

function isNG(t){return ng.some(w=>t.includes(w))}
function addNg(){
  const inp=document.getElementById("ngi");
  const w=inp.value.trim();
  if(!w||ng.includes(w)){inp.value="";return}
  ng.push(w);inp.value="";renderNg();
}
function renderNg(){
  document.getElementById("ngt").innerHTML=ng.map((w,i)=>`<div class="ng-tag" onclick="ng.splice(${i},1);renderNg()">${w}</div>`).join("");
}
document.getElementById("ngi").addEventListener("keydown",e=>{if(e.key==="Enter")addNg()});

function addLog(name,text,type){
  const log=document.getElementById("log");
  const ts=new Date().toTimeString().slice(0,8);
  const body=(type==="comment"&&name)?`<span class="nm">${e(name)}</span> ${e(text)}`:e(text);
  const d=document.createElement("div");
  d.className="li";
  d.innerHTML=`<span class="lt">${ts}</span><div class="lb ${type}">${body}</div>`;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
  while(log.children.length>120)log.removeChild(log.firstChild);
}
function clearLog(){document.getElementById("log").innerHTML=""}
function e(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function setDot(s){document.getElementById("dot").className="dot"+(s?" "+s:"")}
function setSt(t){document.getElementById("st").textContent=t}
function gc(id){return document.getElementById(id).querySelector("input").checked}
function uc(cb,id){document.getElementById(id).classList.toggle("on",cb.checked)}
</script>
</body>
</html>
